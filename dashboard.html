<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GETCASH - Pro Matrix Analyzer</title>
  <style>
    body {
      background: #000;
      margin: 0;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
      opacity: 0.4;
    }

    /* Main UI Container */
    .card {
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #0f0;
      padding: 20px;
      width: 450px;
      border-radius: 8px;
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.4);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
    }

    .header {
      border-bottom: 1px solid #0f0;
      margin-bottom: 20px;
      padding-bottom: 10px;
      color: #fff;
      letter-spacing: 2px;
      font-weight: bold;
    }

    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }

    label {
      font-size: 0.75rem;
      color: #0f0;
      display: block;
      margin-bottom: 5px;
    }

    select,
    input {
      width: 100%;
      padding: 10px;
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      outline: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #0f0;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 10px;
    }

    /* Result Box - Matches your reference image */
    #resultOverlay {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      border: 2px solid #0f0;
      padding: 25px;
      box-sizing: border-box;
      z-index: 20;
      box-shadow: 0 0 30px #0f0;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      color: #f00;
      cursor: pointer;
      font-weight: bold;
    }

    .dashboard-text {
      color: #0f0;
      text-align: left;
      line-height: 1.6;
    }

    .entry-point {
      font-size: 1.4rem;
      color: #fff;
      margin: 15px 0;
      border-left: 3px solid #0f0;
      padding-left: 10px;
    }
  </style>
</head>

<body>

  <canvas id="matrix"></canvas>

  <div class="card">
    <div class="header">SIGNAL ANALYZER</div>

    <div class="input-group">
      <label>SELECT MARKET</label>
      <select id="market">
        <option value="R_10">VOLATILITY 10 INDEX</option>
        <option value="R_50">VOLATILITY 50 INDEX</option>
        <option value="R_100">VOLATILITY 100 INDEX</option>
      </select>
    </div>

    <div style="display: flex; gap: 10px;" class="input-group">
      <div style="flex: 1;">
        <label>TYPE</label>
        <select id="type">
          <option value="over">OVER</option>
          <option value="under">UNDER</option>
        </select>
      </div>
      <div style="flex: 1;">
        <label>PREDICTION (0-8)</label>
        <input type="number" id="pred" value="5" min="0" max="8">
      </div>
    </div>

    <button onclick="startAnalysis()">Analyse</button>

    <div id="resultOverlay">
      <span class="close-btn" onclick="document.getElementById('resultOverlay').style.display='none'">[CLOSE]</span>
      <div id="output" class="dashboard-text"></div>
    </div>
  </div>

  <script>
    // --- MATRIX RAIN ANIMATION ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);

    function drawMatrix() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0F0";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
        rainDrops[i]++;
      }
    }
    setInterval(drawMatrix, 40);

    // --- ANALYSIS LOGIC ---
    let ws;
    function startAnalysis() {
      if (ws) ws.close();
      const output = document.getElementById('output');
      const overlay = document.getElementById('resultOverlay');
      const market = document.getElementById('market').value;
      const type = document.getElementById('type').value;
      const pred = parseInt(document.getElementById('pred').value);

      overlay.style.display = "block";
      output.innerHTML = `<p style="color:#fff">System: Authenticating...</p><p>Scanning Market: ${market}...</p>`;

      ws = new WebSocket('wss://ws.binaryws.com/websockets/v3?app_id=1089');
      let ticks = [];

      ws.onopen = () => ws.send(JSON.stringify({ ticks: market }));

      ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if (data.tick) {
          ticks.push(parseInt(data.tick.quote.toString().slice(-1)));
          // Clear raw data logs and show progress instead
          output.innerHTML = `<p>Analyzing ${market}</p><p>Scanning Ticks: [${ticks.length}/20]</p>`;

          if (ticks.length >= 20) {
            ws.close();
            processResult(ticks, type, pred, market);
          }
        }
      };
    }

    function processResult(data, type, pred, market) {
      const output = document.getElementById('output');
      const wins = type === 'over' ? data.filter(d => d > pred).length : data.filter(d => d < pred).length;
      const prob = (wins / data.length) * 100;

      // Output formatted like your reference image
      if (prob >= 80) {
        output.innerHTML = `
            <div style="border-bottom: 1px solid #0f0; padding-bottom: 10px; margin-bottom: 10px;">
                <span style="color: #fff">Analysis Dashboard - ${type.toUpperCase()} ${pred} on ${market}</span>
            </div>
            <h2 style="color: #0f0; margin: 10px 0;">Analysis Complete!</h2>
            <p>${type.toUpperCase()} (${pred}) with ${prob.toFixed(2)}% Confidence</p>
            <div class="entry-point">Entry Points: ${data.slice(-3).join(', ')}</div>
            <p style="background: #0f0; color: #000; display: inline-block; padding: 5px 15px; font-weight: bold;">RUNNING BOT NOW...</p>
        `;
      } else {
        output.innerHTML = `
            <h2 style="color: #f00;">NO FAVORABLE MARKET</h2>
            <p>Confidence Level: ${prob.toFixed(2)}%</p>
            <hr style="border: 0.5px solid #444; margin: 20px 0;">
            <p style="font-size: 1.1rem; color: #fff;">PLEASE TRY SCANNING AGAIN</p>
        `;
      }
    }
  </script>
</body>

</html>
