<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETCASH | Terminal Login</title>
  <style>
    body {
      background: #000;
      color: #0f0;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .auth-card {
      width: 350px;
      padding: 40px;
      border: 1px solid #0f0;
      background: rgba(0, 10, 0, 0.9);
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
      text-align: center;
    }

    h2 {
      letter-spacing: 5px;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      background: #000;
      border: 1px solid #0f0;
      color: #0f0;
      outline: none;
      box-sizing: border-box;
    }

    input::placeholder {
      color: #050;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #0f0;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
    }

    button:hover {
      background: #fff;
      box-shadow: 0 0 10px #fff;
    }

    p {
      font-size: 0.8rem;
      margin-top: 20px;
      color: #666;
    }

    a {
      color: #0f0;
      text-decoration: none;
      border-bottom: 1px solid #0f0;
    }
  </style>
</head>

<body>

  <div class="auth-card">
    <h2>LOGIN</h2>
    <input type="email" id="loginEmail" placeholder="OPERATOR EMAIL">
    <input type="password" id="loginPass" placeholder="SECURITY KEY">
    <button onclick="handleLogin()">Authorize</button>
    <p>New operator? <a href="register.html">Register Terminal</a></p>
  </div>

  <script src="login.js"></script>
</body>

</html>
