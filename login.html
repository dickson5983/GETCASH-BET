<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETCASH | Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 380px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 900;
      color: #00c851;
      text-decoration: none;
      display: block;
      margin-bottom: 30px;
    }

    h2 {
      margin-bottom: 20px;
      font-weight: 400;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
    }

    input::placeholder {
      color: #94a3b8;
    }

    .btn-login {
      background-color: #00c851;
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      transition: background 0.3s;
    }

    .btn-login:hover {
      background-color: #007e33;
    }

    .links {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .links a {
      color: #00c851;
      text-decoration: none;
    }

    .back-home {
      margin-top: 30px;
      display: block;
      font-size: 0.8rem;
      color: #475569;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <a href="index.html" class="logo">GETCASH</a>
    <h2>Welcome Back</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required>

      <button type="submit" class="btn-login">Login to Account</button>
    </form>

    <div class="links">
      Don't have an account? <a href="register.html">Register here</a>
    </div>

    <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      // Simple simulation of login success
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;

      if (email && pass) {
        // Redirect to dashboard
        window.location.href = "dashboard.html";
      } else {
        alert("Please fill in all fields.");
      }
    });
  </script>

</body>

</html>
