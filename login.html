<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GETCASH | Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <canvas id="matrix"></canvas>
  <div class="auth-card">
    <h2>LOGIN</h2>
    <form id="loginForm">
      <input type="email" id="loginEmail" placeholder="OPERATOR EMAIL" required>
      <input type="password" id="loginPass" placeholder="SECURITY KEY" required>
      <button type="submit">VERIFY IDENTITY</button>
    </form>
    <div id="loginMsg" style="color: #f00; margin-top: 15px; font-size: 0.8rem;"></div>
    <p><a href="register.html">REQUEST NEW ACCESS</a></p>
  </div>

  <script type="module" src="login.js"></script>
  <script src="matrix.js"></script>
</body>

</html>
