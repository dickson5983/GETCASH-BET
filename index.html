<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETCASH | Terminal Entry</title>
  <style>
    body {
      background: #000;
      color: #00ffcc;
      font-family: 'Courier New', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .terminal-box {
      width: 90%;
      max-width: 500px;
      padding: 30px;
      border: 2px solid #00ffcc;
      box-shadow: 0 0 20px #00ffcc;
      background: rgba(0, 20, 0, 0.9);
      text-align: center;
    }

    .disclaimer {
      font-size: 0.8rem;
      color: #ff4444;
      border-bottom: 1px solid #333;
      padding-bottom: 15px;
      margin-bottom: 20px;
      text-align: justify;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 20px 0;
      background: #000;
      border: 1px solid #00ffcc;
      color: #fff;
      text-align: center;
      letter-spacing: 5px;
      outline: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #00ffcc;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #fff;
      box-shadow: 0 0 15px #fff;
    }

    #error-msg {
      color: #ff4444;
      margin-top: 10px;
      font-size: 0.8rem;
      min-height: 1rem;
    }
  </style>
</head>

<body>

  <div class="terminal-box">
    <h2>SYSTEM DISCLAIMER</h2>
    <div class="disclaimer">
      WARNING: This terminal is for simulation and analysis purposes only.
      Trading involves high risk. We are not responsible for financial losses
      incurred through external platforms. Use at your own discretion.
    </div>

    <p>ENTER ACCESS WORD:</p>
    <input type="password" id="accessWord" placeholder="********">
    <button onclick="checkAccess()">AUTHORIZE SESSION</button>
    <div id="error-msg"></div>
  </div>

  <script>
    function checkAccess() {
      const input = document.getElementById('accessWord').value;
      const error = document.getElementById('error-msg');

      if (input === "DECSTAGRAM") {
        // Set a temporary session flag
        sessionStorage.setItem("vault_access", "granted");
        window.location.href = "dashboard.html";
      } else {
        error.innerText = "ACCESS DENIED: INVALID KEYWORD";
        document.getElementById('accessWord').value = "";
      }
    }
  </script>

</body>

</html>
