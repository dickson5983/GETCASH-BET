<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETCASH | Secure Portal</title>
  <style>
    /* Matrix Theme Styling */
    body {
      background: #000;
      margin: 0;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #0f0;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
      opacity: 0.3;
    }

    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 90%;
      max-width: 500px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #0f0;
      box-shadow: 0 0 25px rgba(0, 255, 0, 0.3);
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 12px;
      margin-bottom: 10px;
      text-shadow: 0 0 10px #0f0;
    }

    p {
      letter-spacing: 2px;
      color: #888;
      margin-bottom: 30px;
      font-size: 0.8rem;
    }

    .menu-stack {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .btn {
      padding: 15px;
      background: transparent;
      border: 1px solid #0f0;
      color: #0f0;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      transition: 0.3s;
      cursor: pointer;
    }

    .btn:hover {
      background: #0f0;
      color: #000;
      box-shadow: 0 0 20px #0f0;
    }

    .btn-main {
      background: #0f0;
      color: #000;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.6rem;
      color: #333;
    }
  </style>
</head>

<body>

  <canvas id="matrix"></canvas>

  <div class="container">
    <h1>GETCASH</h1>
    <p>SUPERFAST SIGNAL ENGINE v4.0</p>

    <div class="menu-stack" id="menu">
    </div>

    <div class="footer">STREAMS ENCRYPTED VIA DERIV API</div>
  </div>

  <script>
    // --- MATRIX ANIMATION ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ$#@%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0F0";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        const text = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(draw, 35);

    // --- ACCESS LOGIC ---
    function checkStatus() {
      const menu = document.getElementById('menu');
      const isLoggedIn = sessionStorage.getItem("isLoggedIn") === "true";

      if (isLoggedIn) {
        // User is logged in: Show Dashboard access
        menu.innerHTML = `
                <a href="dashboard.html" class="btn btn-main">Launch Dashboard</a>
                <button onclick="logout()" class="btn">Logout Operator</button>
            `;
      } else {
        // User is NOT logged in: Show Login/Register
        menu.innerHTML = `
                <a href="login.html" class="btn btn-main">Operator Login</a>
                <a href="register.html" class="btn">Register New Terminal</a>
            `;
      }
    }

    function logout() {
      sessionStorage.removeItem("isLoggedIn");
      location.reload();
    }

    // Run check on load
    window.onload = checkStatus;
  </script>

</body>

</html>
