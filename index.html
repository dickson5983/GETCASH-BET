<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETCASH - Secure Access</title>
  <style>
    body {
      background: #000;
      margin: 0;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      color: #0f0;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
      opacity: 0.3;
    }

    .login-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 350px;
      padding: 40px;
      background: rgba(0, 0, 0, 0.9);
      border: 2px solid #0f0;
      box-shadow: 0 0 20px #0f0;
      text-align: center;
    }

    h2 {
      letter-spacing: 5px;
      margin-bottom: 30px;
      text-shadow: 0 0 10px #0f0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      background: #000;
      border: 1px solid #0f0;
      color: #0f0;
      outline: none;
      box-sizing: border-box;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #0f0;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.3s;
    }

    button:hover {
      background: #fff;
      box-shadow: 0 0 15px #fff;
    }

    .version {
      font-size: 0.6rem;
      margin-top: 20px;
      color: #444;
    }
  </style>
</head>

<body>

  <canvas id="matrix"></canvas>

  <div class="login-box">
    <h2>GETCASH</h2>
    <input type="text" id="accessCode" placeholder="ENTER ACCESS CODE" autocomplete="off">
    <button onclick="checkAccess()">Initialize Engine</button>
    <div class="version">SECURE SIGNAL ENGINE v4.0.26</div>
  </div>

  <script>
    // MATRIX RAIN LOGIC
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$#@%";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);

    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0F0";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
        rainDrops[i]++;
      }
    }
    setInterval(draw, 40);

    // ACCESS LOGIC
    function checkAccess() {
      const code = document.getElementById('accessCode').value;
      // You can set your own code here. I'll use "ADMIN80" as an example.
      if (code === "ADMIN80") {
        window.location.href = "dashboard.html";
      } else {
        alert("ACCESS DENIED: INVALID ENCRYPTION KEY");
      }
    }
  </script>
</body>

</html>
