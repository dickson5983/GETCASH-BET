<!DOCTYPE html>
<html>

<head>
  <title>GETCASH | Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <canvas id="matrix"></canvas>
  <div class="auth-card">
    <h2>REGISTER</h2>
    <input type="email" id="regEmail" placeholder="NEW OPERATOR EMAIL">
    <input type="password" id="regPass" placeholder="SET SECURITY KEY">
    <button onclick="handleRegister()">CREATE OPERATOR</button>
    <p><a href="login.html">ALREADY REGISTERED? LOGIN</a></p>
  </div>

  <script>
    // (Copy/Paste the same Matrix script from login.html here)
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const rainDrops = Array.from({ length: columns }).fill(1);
    function draw() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0F0";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < rainDrops.length; i++) {
        const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
        ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) rainDrops[i] = 0;
        rainDrops[i]++;
      }
    }
    setInterval(draw, 30);
  </script>
  <script src="register.js"></script>
</body>

</html>
