<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>GETCASH | Register</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <canvas id="matrix"></canvas>
  <div class="auth-card">
    <h2>REGISTER</h2>
    <form id="registerForm">
      <input type="text" id="name" placeholder="FULL NAME" required>
      <input type="email" id="email" placeholder="OPERATOR EMAIL" required>
      <input type="text" id="phone" placeholder="PHONE NUMBER" required>
      <input type="password" id="password" placeholder="SET SECURITY KEY" required>
      <input type="text" id="referral" placeholder="REFERRAL CODE (OPTIONAL)">

      <button type="submit">CREATE OPERATOR</button>
    </form>
    <div id="status" style="color: #0f0; margin-top: 15px; font-size: 0.8rem;"></div>
    <div id="msg" style="color: #f00; margin-top: 10px; font-size: 0.8rem;"></div>
    <p><a href="login.html">ALREADY REGISTERED? LOGIN</a></p>
  </div>

  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script type="module" src="register.js"></script>
  <script src="matrix.js"></script>
</body>

</html>
