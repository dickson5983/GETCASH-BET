<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - LipaWin</title>
  <!-- Load Paystack inline script (needed for the popup iframe) -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f1f1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    form {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
    input {
      display: block;
      margin-bottom: 15px;
      padding: 10px;
      width: 250px;
    }
    button {
      padding: 10px;
      background: #00b894;
      color: white;
      border: none;
      cursor: pointer;
      width: 100%;
    }
    #msg { color: red; margin-bottom: 10px; }
    #status { color: #333; margin-bottom: 10px; }
  </style>
</head>
<body>
  <!-- Added id so register.js can attach its submit handler -->
  <form id="registerForm">
    <h2>Create Account</h2>
    <div id="msg"></div>
    <div id="status" aria-live="polite"></div>
    <input type="text" id="name" placeholder="Full Name" required />
    <input type="email" id="email" placeholder="Email Address" required />
    <input type="tel" id="phone" placeholder="Phone Number" required />
    <input type="password" id="password" placeholder="Password" required />
    <!-- register.js expects a referral element; include a hidden one to avoid errors -->
    <input type="hidden" id="referral" value="" />
    <button type="submit">Pay & Register</button>
  </form>

  <!-- Load the module that contains the page logic. register.js imports supabase as a module; do NOT include the global supabase CDN script to avoid duplicate declarations. -->
  <script type="module" src="./register.js"></script>
</body>
</html>
