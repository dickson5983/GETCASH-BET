<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETCASH | Register</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .reg-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #00c851;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .fee-note {
      font-size: 0.9rem;
      color: #ddd;
      margin: 15px 0;
    }

    #regButton {
      background-color: #00c851;
      color: white;
      border: none;
      padding: 15px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    #regButton:hover {
      background-color: #007e33;
    }
  </style>
</head>

<body>

  <div class="reg-box">
    <h2>Create Account</h2>
    <form id="registrationForm">
      <input type="text" id="fullname" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="tel" id="phone" placeholder="2547XXXXXXXX" required>
      <input type="password" id="password" placeholder="Create Password" required>

      <p class="fee-note">Registration Fee: <b>KSh 100,000</b></p>

      <button type="submit" id="regButton">Pay & Register</button>
    </form>
  </div>

  <script src="https://js.paystack.co/v2/inline.js"></script>

  <script>
    const registrationForm = document.getElementById('registrationForm');

    registrationForm.addEventListener("submit", function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const phone = document.getElementById("phone").value;
      const name = document.getElementById("fullname").value;

      // Amount in KES subunits (100,000 * 100)
      const amount = 100000 * 100;

      const paystack = new PaystackPop();
      paystack.newTransaction({
        // Your Live Public Key as provided
        key: 'pk_live_976d99fd957145cdb38cdac9d50753863e0f3d63',
        email: email,
        amount: amount,
        currency: "KES",
        channels: ['mobile_money', 'card', 'bank_transfer'],
        metadata: {
          custom_fields: [
            { display_name: "Full Name", variable_name: "full_name", value: name },
            { display_name: "Phone Number", variable_name: "phone_number", value: phone }
          ]
        },
        onSuccess: (transaction) => {
          // Step 1: Tell the user it worked
          alert("Payment Successful! Welcome to GETCASH.");

          // Step 2: Send data to your backend to save the user
          // Example: window.location.href = "success.php?ref=" + transaction.reference;
        },
        onCancel: () => {
          alert("Registration cancelled. Payment is required to join.");
        },
        onError: (error) => {
          alert("System Error: " + error.message);
        }
      });
    });
  </script>

</body>

</html>
